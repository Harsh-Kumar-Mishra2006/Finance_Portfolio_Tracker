# render.yaml
services:
  - type: web
    name: finance-portfolio-tracker-api
    env: node
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: finance-portfolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://your-frontend-url.onrender.com
    healthCheckPath: /health

  - type: web
    name: finance-portfolio-tracker-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://finance-portfolio-tracker-api.onrender.com/api
